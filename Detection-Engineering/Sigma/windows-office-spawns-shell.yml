title: Office Application Spawning Shell Process
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: stable
description: >
  Detects Office applications spawning command interpreters or scripting hosts.
  Strong indicator of malicious macro execution or document-based initial access.
author: Solomon James (@Jaysolex)
date: 2024/01/01
references:
  - https://attack.mitre.org/techniques/T1059/
  - https://attack.mitre.org/techniques/T1566/001/
tags:
  - attack.execution
  - attack.t1059
  - attack.initial_access
  - attack.t1566.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\onenote.exe'
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\certutil.exe'
  condition: selection
falsepositives:
  - Legitimate macro-based automation tools (whitelist by hash)
level: high
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
