title: Volume Shadow Copy Deletion
id: c8d9e0f1-a2b3-4567-cdef-890123456789
status: stable
description: >
  Detects deletion of volume shadow copies using vssadmin, wbadmin, or wmic.
  Shadow copy deletion is a precursor to ransomware encryption and data destruction.
author: Solomon James (@Jaysolex)
date: 2024/01/01
references:
  - https://attack.mitre.org/techniques/T1490/
tags:
  - attack.impact
  - attack.t1490
  - attack.defense_evasion
logsource:
  product: windows
  category: process_creation
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains:
      - 'delete shadows'
      - 'delete shadow'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - 'shadowcopy delete'
      - 'shadowcopy where'
  selection_wbadmin:
    Image|endswith: '\wbadmin.exe'
    CommandLine|contains: 'delete catalog'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: selection_vssadmin OR selection_wmic OR selection_wbadmin OR selection_powershell
falsepositives:
  - Legitimate backup software managing shadow copies
level: critical
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
