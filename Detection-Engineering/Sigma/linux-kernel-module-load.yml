title: Kernel Module Loaded by Non-System Process
id: a3b4c5d6-e7f8-9012-abcd-234567890123
status: stable
description: >
  Detects kernel module loading via insmod or modprobe syscall outside
  of expected system boot or hardware change context.
author: Solomon James (@Jaysolex)
date: 2024/01/01
references:
  - https://attack.mitre.org/techniques/T1547/006/
tags:
  - attack.persistence
  - attack.t1547.006
  - attack.defense_evasion
  - attack.t1014
logsource:
  product: linux
  service: auditd
detection:
  selection:
    type: SYSCALL
    syscall:
      - init_module
      - finit_module
  filter_boot:
    auid: 4294967295
  condition: selection and not filter_boot
falsepositives:
  - Admin loading hardware drivers
  - Security tools with kernel components
level: high
