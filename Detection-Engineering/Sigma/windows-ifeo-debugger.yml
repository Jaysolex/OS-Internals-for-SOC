title: Image File Execution Options Debugger Entry Added
id: a2b3c4d5-e6f7-8901-abcd-234567890123
status: stable
description: >
  Detects creation of IFEO Debugger registry entries. Attackers use this technique
  to replace accessibility binaries accessible from the Windows lock screen
  with command shells running as SYSTEM.
author: Solomon James (@Jaysolex)
date: 2024/01/01
references:
  - https://attack.mitre.org/techniques/T1546/012/
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1546.012
logsource:
  product: windows
  category: registry_set
detection:
  selection:
    EventID: 13
    TargetObject|contains: '\Image File Execution Options\'
    TargetObject|endswith: '\Debugger'
  condition: selection
falsepositives:
  - Legitimate debugger registration by developers
  - Visual Studio debugging configuration
level: high
fields:
  - Image
  - TargetObject
  - Details
  - User
